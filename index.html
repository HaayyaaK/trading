<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مِرصاد الأسواق — Market Mirsad</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="assets/site.webmanifest">
<meta name="theme-color" content="#0b0e15">
<!-- Dual-script text fonts, self-hosted (no third-party origin): Readex Pro for
     titles, IBM Plex Sans Arabic for body. Both cover Arabic + Latin with matched
     metrics, so there is no per-language font switching. -->
<link rel="stylesheet" href="assets/fonts/fonts.css">
<!-- Local vendor assets (offline-capable, no third-party CDN): FontAwesome icons
     and Apache ECharts (candlestick + volume + volatility charts). -->
<link rel="stylesheet" href="assets/fontawesome-free-v7.3.1-web/css/all.min.css">
<script src="assets/echarts-v6.1.0/dist/echarts.min.js"></script>
<style>
/* ==========================================================================
   DESIGN SYSTEM — "Mirsad" visual identity
   Two deliberate palettes (not inversions): dark = deep ink with brushed-gold
   accent; light = warm paper with burnished bronze. Semantic bull/bear/neutral
   hues keep the same identity across themes, contrast-adjusted.
   All theme values are custom properties on :root[data-theme=…]; components
   only ever reference tokens. Layout uses logical properties so RTL (Arabic,
   the default) and LTR mirror correctly with no directional overrides.
   ========================================================================== */

:root[data-theme="dark"] {
  --bg: #0b0e15;
  --bg-raise: #11151f;
  --card: #141927;
  --card-2: #1a2032;
  --border: #232b40;
  --border-strong: #313b58;
  --text-1: #eef1f8;
  --text-2: #9aa5c0;
  --text-3: #5d6883;
  --accent: #d9b16b;          /* brushed gold */
  --accent-ink: #14100a;
  --accent-soft: rgba(217, 177, 107, .12);
  --bull: #3ecf9a;
  --bull-soft: rgba(62, 207, 154, .13);
  --bear: #f0647c;
  --bear-soft: rgba(240, 100, 124, .13);
  --neut: #8d99b8;
  --neut-soft: rgba(141, 153, 184, .14);
  --warn: #e8b64c;
  --warn-soft: rgba(232, 182, 76, .12);
  --shadow: 0 12px 32px rgba(0, 0, 0, .45);
  --grid-line: rgba(154, 165, 192, .13);
  color-scheme: dark;
}
:root[data-theme="light"] {
  --bg: #f4f1ea;
  --bg-raise: #ece8de;
  --card: #fdfcf9;
  --card-2: #f6f3ec;
  --border: #e0dacc;
  --border-strong: #c9c1ad;
  --text-1: #241f16;
  --text-2: #6b6353;
  --text-3: #a39a86;
  --accent: #9a6d1f;          /* burnished bronze */
  --accent-ink: #fffdf7;
  --accent-soft: rgba(154, 109, 31, .1);
  --bull: #0e8a63;
  --bull-soft: rgba(14, 138, 99, .11);
  --bear: #c22745;
  --bear-soft: rgba(194, 39, 69, .1);
  --neut: #6f7890;
  --neut-soft: rgba(111, 120, 144, .12);
  --warn: #a06a08;
  --warn-soft: rgba(160, 106, 8, .12);
  --shadow: 0 10px 26px rgba(64, 52, 24, .12);
  --grid-line: rgba(107, 99, 83, .16);
  color-scheme: light;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

/* Type system: two dual-script families (each covers Arabic + Latin with
   matched metrics), so no per-language font switching is needed.
   --font-body: IBM Plex Sans Arabic (content); --font-title: Readex Pro
   (card titles, brand, headings) — distinct but harmonious. */
:root {
  --font-body: "IBM Plex Sans Arabic", "Segoe UI", system-ui, sans-serif;
  --font-title: "Readex Pro", "IBM Plex Sans Arabic", "Segoe UI", system-ui, sans-serif;

  /* Type scale — 8 defined steps (replaces 13 ad-hoc sizes). */
  --fs-2xs: 11px;   /* micro meta (news source) */
  --fs-xs: 12px;    /* hints, chips, table headers, tile sub-labels */
  --fs-sm: 13px;    /* secondary text, tile labels, report body */
  --fs-base: 14px;  /* controls, primary body */
  --fs-md: 15px;    /* card titles, consensus counts */
  --fs-lg: 16px;    /* reading figures */
  --fs-xl: 18px;    /* emphasis (lean label, info-tile value) */
  --fs-2xl: 21px;   /* brand */

  /* Spacing scale — used for paddings, gaps, and margins. */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;  --sp-5: 20px;  --sp-6: 24px;
  --gap-card: var(--sp-4);   /* gap between cards / columns */
  --pad-card: var(--sp-5);   /* card inner padding */
  --pad-tile: 13px 14px;     /* inner padding for sub-tiles (info/ind/news) */
  --radius-card: 16px;
  --radius-tile: 12px;
  --radius-control: 10px;
}

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: var(--fs-md);
  line-height: 1.55;
  min-height: 100vh;
  transition: background .35s ease, color .35s ease;
}

/* numerals keep Latin glyphs in both languages (financial convention) */
.num, td.num, .price { font-variant-numeric: tabular-nums; direction: ltr; unicode-bidi: isolate; }

.wrap { max-width: 1280px; margin-inline: auto; padding: 20px clamp(14px, 3vw, 32px) 60px; }

/* ---------- header ---------- */
header.site {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding-block: 18px 22px;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-mark {
  inline-size: 44px; block-size: 44px; border-radius: var(--radius-tile); flex: none;
  background: linear-gradient(140deg, var(--accent), color-mix(in srgb, var(--accent) 55%, var(--bg)));
  display: grid; place-items: center; color: var(--accent-ink);
  box-shadow: var(--shadow);
}
.brand h1 { font-family: var(--font-title); font-size: var(--fs-2xl); font-weight: 700; letter-spacing: .2px; }
.brand p { font-size: var(--fs-xs); color: var(--text-2); }
.head-tools { margin-inline-start: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.status-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 13px; border-radius: 999px; font-size: var(--fs-xs); font-weight: 700;
  border: 1px solid var(--border); background: var(--card); color: var(--text-2);
}
.status-badge .dot { inline-size: 8px; block-size: 8px; border-radius: 50%; background: var(--text-3); }
.status-badge.is-live .dot { background: var(--bull); animation: pulse 2.2s infinite; }
.status-badge.is-live { color: var(--bull); border-color: color-mix(in srgb, var(--bull) 35%, var(--border)); }
.status-badge.is-stale .dot { background: var(--warn); }
.status-badge.is-stale { color: var(--warn); }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--bull-soft);} 50% { box-shadow: 0 0 0 6px var(--bull-soft);} }

.pill-toggle {
  display: inline-flex; border: 1px solid var(--border); border-radius: 999px;
  background: var(--card); overflow: hidden;
}
.pill-toggle button {
  border: 0; background: transparent; color: var(--text-2); cursor: pointer;
  padding: 7px 15px; font: inherit; font-size: var(--fs-sm); font-weight: 700;
  transition: background .2s, color .2s;
}
.pill-toggle button.active { background: var(--accent); color: var(--accent-ink); }
.icon-btn {
  inline-size: 38px; block-size: 38px; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--border); background: var(--card); color: var(--text-2);
  display: grid; place-items: center; font-size: var(--fs-lg); transition: transform .25s, color .2s;
}
.icon-btn:hover { color: var(--accent); transform: rotate(15deg); }

/* ---------- cards ---------- */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card);
  box-shadow: var(--shadow); padding: var(--pad-card);
  transition: background .35s ease, border-color .35s ease;
}
.card h2 {
  font-family: var(--font-title);
  font-size: var(--fs-md); font-weight: 600; letter-spacing: .2px; color: var(--text-1);
  display: flex; align-items: center; gap: 10px; margin-block-end: 14px;
}
.card h2::before {
  content: ""; inline-size: 5px; block-size: 18px; border-radius: 3px;
  background: var(--accent); flex: none;
}

/* ---------- collapsible cards ---------- */
.card-head { cursor: pointer; user-select: none; margin-block-end: 14px; }
.card-head:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 6px; }
.card-title { flex: 1 1 auto; }
.card-chevron {
  flex: none; margin-inline-start: auto;
  inline-size: 28px; block-size: 28px; border-radius: 8px;
  display: grid; place-items: center;
  border: 1px solid var(--border-strong); background: var(--card-2); color: var(--text-2);
  transition: transform .3s ease, color .2s, background .2s, border-color .2s;
}
.card-head:hover .card-chevron { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }
.card-chevron svg { inline-size: 15px; block-size: 15px; display: block; }
.card-chevron i { font-size: var(--fs-md); line-height: 1; }
/* expanded = caret down, collapsed = caret up (rotate 180°). Up/down only,
   never left/right, so the direction reads identically in RTL and LTR. */
.card.collapsed .card-chevron { transform: rotate(180deg); }
/* collapsing hides the body wrapper; the header stays interactive */
.card.collapsed > .card-body { display: none; }
.card.collapsed { padding-block-end: var(--pad-card); }
.card.collapsed .card-head { margin-block-end: 0; }
.card-body { animation: cardReveal .28s ease; }
@keyframes cardReveal { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

/* ---------- consensus stacked bar ---------- */
.consensus-bar {
  display: flex; block-size: 16px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); margin-block: 12px 10px; background: var(--card-2);
}
.consensus-bar span { display: block; transition: inline-size .5s ease; min-inline-size: 0; }
.consensus-bar .seg-bull { background: var(--bull); }
.consensus-bar .seg-bear { background: var(--bear); }
.consensus-bar .seg-neut { background: var(--neut); }
.consensus-bar .seg-na { background: var(--border-strong); }
.consensus-legend { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* ---------- selection row ---------- */
.selection-grid { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr auto; gap: 14px; align-items: end; }
.field select:disabled { opacity: .6; cursor: not-allowed; }
.field label { display: block; font-size: var(--fs-xs); font-weight: 700; color: var(--text-2); margin-block-end: 6px; }
.field select {
  inline-size: 100%; padding: 10px 12px; font: inherit; font-size: var(--fs-base);
  color: var(--text-1); background: var(--card-2); border: 1px solid var(--border);
  border-radius: var(--radius-control); cursor: pointer;
}
.btn-primary {
  padding: 11px 26px; border: 0; border-radius: var(--radius-control); cursor: pointer;
  background: var(--accent); color: var(--accent-ink);
  font: inherit; font-size: var(--fs-base); font-weight: 700; letter-spacing: .2px;
  transition: filter .2s, transform .12s; box-shadow: var(--shadow);
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { transform: translateY(1px); }
.btn-primary[disabled] { opacity: .55; cursor: wait; }
.hint { font-size: var(--fs-xs); color: var(--text-3); margin-block-start: 8px; }

/* ---------- reading card ---------- */
.reading-layout { display: grid; grid-template-columns: 300px 1fr; gap: var(--sp-6); align-items: center; }
.gauge-wrap { text-align: center; }
.gauge-wrap svg { max-inline-size: 100%; }
.lean-label { font-size: var(--fs-xl); font-weight: 700; margin-block-start: 2px; }
.lean-label.bull { color: var(--bull); } .lean-label.bear { color: var(--bear); } .lean-label.neut { color: var(--neut); }
.reading-numbers { display: flex; gap: 22px; justify-content: center; margin-block-start: 10px; flex-wrap: wrap; }
.reading-numbers .item { text-align: center; }
.reading-numbers .item .v { font-size: var(--fs-lg); font-weight: 700; }
.reading-numbers .item .k { font-size: var(--fs-xs); color: var(--text-3); font-weight: 700; }

.notice {
  border-radius: var(--radius-control); padding: 9px 13px; font-size: var(--fs-xs); font-weight: 600;
  border: 1px solid var(--border);
}
.notice.advice { background: var(--accent-soft); color: var(--text-2); border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }
.notice.warn { background: var(--warn-soft); color: var(--warn); border-color: color-mix(in srgb, var(--warn) 35%, var(--border)); }
.notice.src { background: var(--card-2); color: var(--text-2); }
.notice + .notice { margin-block-start: 8px; }

.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-block-start: 16px; }
.info-tile { background: var(--card-2); border: 1px solid var(--border); border-radius: var(--radius-tile); padding: var(--pad-tile); }
.info-tile .t { font-size: var(--fs-xs); font-weight: 700; color: var(--text-2); margin-block-end: 6px; }
.info-tile .big { font-size: var(--fs-xl); font-weight: 700; }
.info-tile .sub { font-size: var(--fs-xs); color: var(--text-3); margin-block-start: 4px; }

/* ---------- tiers ---------- */
.tier-row { display: grid; grid-template-columns: 220px 1fr 64px; gap: 14px; align-items: center; padding-block: 10px; border-block-end: 1px dashed var(--border); }
.tier-row:last-child { border-block-end: 0; }
.tier-row .name { font-size: var(--fs-sm); font-weight: 700; color: var(--text-2); }
.tier-row .name .w { color: var(--text-3); font-weight: 600; font-size: var(--fs-xs); }
.tier-bar { position: relative; block-size: 10px; border-radius: 6px; background: var(--card-2); border: 1px solid var(--border); overflow: hidden; }
.tier-bar .fill { position: absolute; inset-block: 0; transition: inline-size .5s ease; }
.tier-bar .mid { position: absolute; inset-block: 0; inset-inline-start: 50%; inline-size: 1px; background: var(--border-strong); }
.tier-row .val { font-size: var(--fs-base); font-weight: 700; text-align: center; }

/* ---------- indicator tiles ---------- */
.cat-title { font-size: var(--fs-xs); font-weight: 700; color: var(--text-3); letter-spacing: .8px; text-transform: uppercase; margin: 16px 0 8px; }
.ind-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ind-tile { background: var(--card-2); border: 1px solid var(--border); border-radius: var(--radius-tile); padding: var(--pad-tile); }
.ind-tile .row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ind-tile .n { font-size: var(--fs-xs); font-weight: 700; color: var(--text-2); }
.ind-tile .v { font-size: var(--fs-sm); font-weight: 700; }
.ind-tile .meter { block-size: 6px; border-radius: 4px; background: var(--bg-raise); margin-block-start: 8px; position: relative; overflow: hidden; }
.ind-tile .meter .mid { position: absolute; inset-block: 0; inset-inline-start: 50%; inline-size: 1px; background: var(--border-strong); z-index: 1; }
.ind-tile .meter .fill { position: absolute; inset-block: 0; border-radius: 4px; transition: all .45s ease; }
.ind-tile .na-note { font-size: var(--fs-xs); color: var(--text-3); margin-block-start: 6px; }

.chip { display: inline-flex; align-items: center; gap: 5px; border-radius: 999px; padding: 2px 10px; font-size: var(--fs-xs); font-weight: 700; }
.chip.bull { background: var(--bull-soft); color: var(--bull); }
.chip.bear { background: var(--bear-soft); color: var(--bear); }
.chip.neut { background: var(--neut-soft); color: var(--neut); }
.chip.na { background: var(--card-2); color: var(--text-3); border: 1px dashed var(--border-strong); }

.consensus { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-block-start: 14px; }
.consensus .count { font-size: var(--fs-md); font-weight: 700; }

/* ---------- levels table ---------- */
table.levels { inline-size: 100%; border-collapse: collapse; font-size: var(--fs-sm); }
table.levels th { text-align: start; color: var(--text-3); font-size: var(--fs-xs); letter-spacing: .5px; padding: 7px 10px; border-block-end: 1px solid var(--border); }
table.levels td { padding: 7px 10px; border-block-end: 1px solid var(--border); color: var(--text-2); }
table.levels tr:last-child td { border-block-end: 0; }
table.levels td.num { font-weight: 700; color: var(--text-1); }

/* ---------- written report ---------- */
.report-paras p { font-size: var(--fs-sm); color: var(--text-2); margin-block-end: 10px; line-height: 1.8; }
.report-paras p:first-child { color: var(--text-1); font-weight: 600; }
.report-paras p:last-child { margin-block-end: 0; font-size: var(--fs-xs); color: var(--text-3); border-block-start: 1px dashed var(--border); padding-block-start: 10px; }

/* ---------- news ---------- */
.news-list { display: flex; flex-direction: column; gap: 10px; }
.news-item { display: flex; gap: 10px; align-items: flex-start; background: var(--card-2); border: 1px solid var(--border); border-radius: var(--radius-tile); padding: var(--pad-tile); }
/* plaintext bidi: headlines render in their own script's direction, so Latin
   punctuation stops jumping to the wrong end inside the RTL layout */
.news-item .title { font-size: var(--fs-sm); font-weight: 600; color: var(--text-1); text-decoration: none; unicode-bidi: plaintext; display: block; }
.news-item .title:hover { color: var(--accent); }
.news-item .meta { font-size: var(--fs-2xs); color: var(--text-3); margin-block-start: 3px; unicode-bidi: plaintext; }
.news-item .chip { flex: none; margin-block-start: 2px; }

/* ---------- charts ---------- */
.chart-box { background: var(--card-2); border: 1px solid var(--border); border-radius: var(--radius-tile); padding: var(--sp-3); margin-block-start: var(--sp-3); }
.chart-box .t { font-family: var(--font-title); font-size: var(--fs-xs); font-weight: 600; color: var(--text-2); margin-block-end: 6px; }
/* ECharts renders into this div; it needs an explicit height */
.echart { inline-size: 100%; block-size: 200px; }
#chart-price.echart { block-size: 230px; }
.chart-na { font-size: var(--fs-xs); color: var(--text-3); padding: 20px 0; text-align: center; }

/* ---------- layout ---------- */
main { display: flex; flex-direction: column; gap: var(--gap-card); }
.two-col { display: grid; grid-template-columns: 1.1fr .9fr; gap: var(--gap-card); align-items: start; }
.col { display: flex; flex-direction: column; gap: var(--gap-card); }

footer.site { margin-block-start: var(--sp-6); color: var(--text-3); font-size: var(--fs-xs); display: flex; flex-direction: column; gap: 4px; }

.skeleton { border-radius: var(--radius-control); background: linear-gradient(90deg, var(--card-2) 25%, var(--bg-raise) 50%, var(--card-2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; min-block-size: 90px; }
@keyframes shimmer { to { background-position: -200% 0; } }

/* ---------- responsive breakpoints ----------
   1080 tablet-landscape: two columns stack to one.
    860 tablet-portrait:  reading gauge/detail stack; selection -> 2 cols.
    620 phone:            everything single-column; tighter card padding.
    420 small phone:      slightly smaller base type; header tightens. */
@media (max-width: 1080px) {
  .two-col { grid-template-columns: 1fr; }
}
@media (max-width: 860px) {
  .reading-layout { grid-template-columns: 1fr; gap: var(--sp-5); justify-items: center; }
  .reading-layout > div:last-child { inline-size: 100%; }
  .selection-grid { grid-template-columns: 1fr 1fr; }
  .selection-grid > div:last-child { grid-column: 1 / -1; }
  .selection-grid .btn-primary { inline-size: 100%; }
}
@media (max-width: 620px) {
  :root { --pad-card: var(--sp-4); --gap-card: var(--sp-3); }
  .wrap { padding-inline: var(--sp-3); }
  .info-grid { grid-template-columns: 1fr; }
  .selection-grid { grid-template-columns: 1fr; }
  .ind-grid { grid-template-columns: 1fr; }
  .tier-row { grid-template-columns: 1fr; gap: var(--sp-1); padding-block: var(--sp-2); }
  .tier-row .val { text-align: start; }
  .reading-numbers { gap: var(--sp-4); }
  header.site { gap: var(--sp-3); padding-block: var(--sp-3) var(--sp-4); }
}
@media (max-width: 420px) {
  body { font-size: var(--fs-base); }
  .brand h1 { font-size: var(--fs-xl); }
  .brand-mark { inline-size: 38px; block-size: 38px; }
  .head-tools { gap: var(--sp-2); }
  .card-title { font-size: var(--fs-base); }
}
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3 17 8 10l4 4 6-9" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="18" cy="5" r="2" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1 id="app-title"></h1>
        <p id="app-subtitle"></p>
      </div>
    </div>
    <div class="head-tools">
      <span id="status-badge" class="status-badge"><span class="dot"></span></span>
      <div class="pill-toggle" role="group" aria-label="language">
        <button id="btn-ar" type="button">عربي</button>
        <button id="btn-en" type="button">EN</button>
      </div>
      <button id="btn-theme" class="icon-btn" type="button" aria-label="theme"></button>
    </div>
  </header>

  <main>
    <section class="card" data-card="selection">
      <h2 class="card-head"><span class="card-title" id="selection-title"></span></h2>
      <div class="card-body">
        <div class="selection-grid">
          <div class="field"><label id="label-class" for="sel-class"></label><select id="sel-class"></select></div>

function findInstrument(id) {
  for (const cls of Object.keys(INSTRUMENTS)) {
    const hit = INSTRUMENTS[cls].find((i) => i.id === id);
    if (hit) return { ...hit, assetClass: cls };
  }
  return null;
}

// --- Low-level fetch helper -------------------------------------------------
async function getJson(url, timeoutMs) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs || 12000);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

const BINANCE_HOSTS = ['https://api.binance.com', 'https://data-api.binance.vision'];

async function binanceJson(path) {
  let lastErr;
  for (const host of BINANCE_HOSTS) {
    try { return await getJson(host + path); } catch (e) { lastErr = e; }
  }
  throw lastErr;
}

// --- Candle constructors ----------------------------------------------------
function candleFromKline(k) {
  return { t: k[0], o: +k[1], h: +k[2], l: +k[3], c: +k[4], v: +k[5] };
}
function candleFromDailyClose(dateStr, close) {
  return { t: Date.parse(dateStr + 'T00:00:00Z'), o: close, h: close, l: close, c: close, v: 0 };
}

// --- History fetchers (one full load per asset switch) -----------------------
async function fetchBinanceHistory(symbol, timeframe) {
  const iv = TIMEFRAMES.includes(timeframe) ? timeframe : '1h';
  const k = await binanceJson(`/api/v3/klines?symbol=${symbol}&interval=${iv}&limit=${BINANCE_CANDLE_LIMIT}`);
  if (!Array.isArray(k) || k.length < 250) throw new Error('short kline response');
  return k.map(candleFromKline);
}

// Frankfurter serves the whole daily series in one request; crosses are computed
// from the EUR base (e.g. GBP/JPY = (JPY per EUR) / (GBP per EUR)).
const FX_PAIR_CALC = {
  EURUSD: (r) => r.USD,
  USDJPY: (r) => r.JPY / r.USD,
  GBPJPY: (r) => r.JPY / r.GBP,
  AUDUSD: (r) => r.USD / r.AUD,
  NZDUSD: (r) => r.USD / r.NZD,
  USDCAD: (r) => r.CAD / r.USD,
  USDCHF: (r) => r.CHF / r.USD,
};
const FX_SYMBOLS = 'USD,JPY,GBP,AUD,NZD,CAD,CHF';

async function fetchForexHistory(pairId) {
  const start = new Date(Date.now() - 330 * 864e5).toISOString().slice(0, 10);
  const j = await getJson(`https://api.frankfurter.dev/v1/${start}..?base=EUR&symbols=${FX_SYMBOLS}`);
  const days = Object.keys(j.rates || {}).sort();
  if (days.length < 200) throw new Error('short frankfurter series');
  const calc = FX_PAIR_CALC[pairId];
  return days.map((d) => candleFromDailyClose(d, +calc(j.rates[d]).toFixed(6)));
}

async function fetchMetalSpot(metal) {
  const j = await getJson(`https://api.gold-api.com/price/${metal}`);
  if (typeof j.price !== 'number' || !(j.price > 0)) throw new Error('bad spot payload');
  return { price: j.price, at: Date.parse(j.updatedAt) || Date.now() };
}

function seedDailyCandles(points) {
  return points.map((p) => candleFromDailyClose(p.date, p.close));
}

// --- Latest-tick fetchers (poll: mutate last candle, never re-fetch history) --
async function fetchBinanceLatest(symbol, timeframe) {
  const iv = TIMEFRAMES.includes(timeframe) ? timeframe : '1h';
  const k = await binanceJson(`/api/v3/klines?symbol=${symbol}&interval=${iv}&limit=1`);
  if (!Array.isArray(k) || !k.length) throw new Error('empty latest kline');
  return candleFromKline(k[0]);
}

async function fetchForexLatest(pairId) {
  // open.er-api.com publishes one USD-based rate set per day (hourly edge cache).
  const j = await getJson('https://open.er-api.com/v6/latest/USD');
  const r = j && j.rates;
  if (!r || !r.EUR || !r.JPY || !r.GBP || !r.AUD || !r.NZD || !r.CAD || !r.CHF) throw new Error('bad er-api payload');
  const calcFromUsd = {
    EURUSD: () => 1 / r.EUR,
    USDJPY: () => r.JPY,
    GBPJPY: () => r.JPY / r.GBP,
    AUDUSD: () => 1 / r.AUD,
    NZDUSD: () => 1 / r.NZD,
    USDCAD: () => r.CAD,
    USDCHF: () => r.CHF,
  }[pairId];
  const dateStr = new Date((j.time_last_update_unix || Date.now() / 1000) * 1000)
    .toISOString().slice(0, 10);
  return { dateStr, close: +calcFromUsd().toFixed(6) };
}

// --- Series assembly with fallbacks ------------------------------------------
// Returns { candles, meta } where meta.live is false when the embedded snapshot
// had to be used. Never throws — the caller always gets a renderable series.
async function loadSeries(instrument, timeframe) {
  const inst = typeof instrument === 'string' ? findInstrument(instrument) : instrument;
  const binanceSrc = inst.source === 'binance' || inst.source === 'binance+goldapi';
  const tf = effectiveTimeframe(inst, timeframe);
  const meta = {
    id: inst.id, timeframe: tf, live: true, spot: null,
    ohlc: binanceSrc, hasVolume: binanceSrc,
    note: null,
  };
  try {
    if (binanceSrc) {
      const candles = await fetchBinanceHistory(inst.symbol, tf);
      if (inst.metal) {
        try { meta.spot = await fetchMetalSpot(inst.metal); } catch (e) { /* spot is optional garnish */ }
      }
      return { candles, meta };
    }
    if (inst.source === 'frankfurter') {
      const candles = await fetchForexHistory(inst.id);
      // top up with today's er-api rate if it's a newer session
      try {
        const latest = await fetchForexLatest(inst.id);
        applyDailyTick(candles, latest);
      } catch (e) { /* history alone is still fine */ }
      return { candles, meta };
    }
    if (inst.source === 'seed+goldapi') {
      // Seed history is embedded real data; only the live tip comes from the network.
      const candles = seedDailyCandles(SEEDS.metals[inst.metal]);
      const spot = await fetchMetalSpot(inst.metal); // throws -> fallback path below
      meta.spot = spot;
      applyDailyTick(candles, { dateStr: new Date(spot.at).toISOString().slice(0, 10), close: spot.price });
      meta.note = 'seed-history+live-spot';
      return { candles, meta };
    }
    throw new Error('unknown source ' + inst.source);
  } catch (err) {
    const fb = fallbackSeries(inst);
    return {
      candles: fb.candles,
      meta: {
        ...meta, live: false, error: String(err && err.message || err),
        timeframe: fb.timeframe, ohlc: fb.ohlc, hasVolume: fb.hasVolume,
      },
    };
  }
}

// Embedded-snapshot fallback, keyed by instrument id (never by exchange symbol,
// so a bad/renamed symbol can't also break the fallback). Each branch reports
// the shape of what it returns, since it may differ from the live shape (e.g.
// gold falls back to the DAILY metals seed — 235 candles beat a 60-candle
// hourly snapshot for indicator validity).
const CRYPTO_SNAPSHOT_KEY = { BTCUSD: 'BTCUSDT', ETHUSD: 'ETHUSDT' };

function fallbackSeries(inst) {
  const ck = CRYPTO_SNAPSHOT_KEY[inst.id];
  if (ck && SEEDS.crypto[ck]) {
    return { candles: SEEDS.crypto[ck].map(candleFromKline), timeframe: '1h', ohlc: true, hasVolume: true };
  }
  if (inst.metal && SEEDS.metals[inst.metal]) {
    return { candles: seedDailyCandles(SEEDS.metals[inst.metal]), timeframe: '1d', ohlc: false, hasVolume: false };
  }
  return { candles: seedDailyCandles(SEEDS.forex[inst.id] || []), timeframe: '1d', ohlc: false, hasVolume: false };
}

// Mutates the tip of a DAILY series: same session -> update close (and h/l when
// the series is close-only, keep o=h=l=c consistent); new session -> push.
function applyDailyTick(candles, tick) {
  const t = Date.parse(tick.dateStr + 'T00:00:00Z');
  const last = candles[candles.length - 1];
  if (last && last.t === t) {
    last.c = tick.close; last.o = tick.close; last.h = tick.close; last.l = tick.close;
  } else if (!last || t > last.t) {
    candles.push(candleFromDailyClose(tick.dateStr, tick.close));
  }
}

// Mutates the tip of a Binance (intraday or daily) series from a fresh kline:
// same open-time -> replace (kline is the still-forming candle), newer -> push
// and trim head. Keys on the kline open-time, so it works at any interval.
function applyIntradayTick(candles, tick) {
  const last = candles[candles.length - 1];
  if (last && last.t === tick.t) {
    candles[candles.length - 1] = tick;
  } else if (!last || tick.t > last.t) {
    candles.push(tick);
    if (candles.length > BINANCE_CANDLE_LIMIT + 24) candles.splice(0, candles.length - BINANCE_CANDLE_LIMIT);
  }
}

// One poll step for the active instrument. Mutates `series` in place and
// returns { ok, price, live } describing what happened. Never throws.
async function pollTick(inst, series) {
  try {
    if (inst.source === 'binance' || inst.source === 'binance+goldapi') {
      const tick = await fetchBinanceLatest(inst.symbol, series.meta.timeframe);
      applyIntradayTick(series.candles, tick);
      if (inst.metal) {
        try { series.meta.spot = await fetchMetalSpot(inst.metal); } catch (e) { /* keep old spot */ }
      }
      return { ok: true, price: tick.c };
    }
    if (inst.source === 'frankfurter') {
      const latest = await fetchForexLatest(inst.id);
      applyDailyTick(series.candles, latest);
      return { ok: true, price: latest.close };
    }
    if (inst.source === 'seed+goldapi') {
      const spot = await fetchMetalSpot(inst.metal);
      series.meta.spot = spot;
      applyDailyTick(series.candles, { dateStr: new Date(spot.at).toISOString().slice(0, 10), close: spot.price });
      return { ok: true, price: spot.price };
    }
    return { ok: false };
  } catch (err) {
    return { ok: false, error: String(err && err.message || err) };
  }
}

// Poll cadence per source, chosen against verified rate limits / cache headers:
//   binance   20s  (weight 2 of 6000/min budget — negligible)
//   gold-api  30s  (their Cache-Control is max-age≈30 — faster polling is wasted)
//   forex    300s  (both providers publish one rate set per day)
function pollIntervalMs(inst) {
  if (inst.source === 'binance' || inst.source === 'binance+goldapi') return 20000;
  if (inst.source === 'seed+goldapi') return 30000;
  return 300000;
}

// --- News (GDELT DOC API) -----------------------------------------------------
// GDELT is keyless and CORS-permissive ON SUCCESS: verified live 2026-07-17 that
// a 200 response still carries `Access-Control-Allow-Origin: *`. Its CORS policy
// has NOT changed. The production failures are RATE-LIMITING: GDELT enforces
// "one request every 5 seconds" per IP, and its 429 responses carry NO CORS
// header, so a browser fetch() rejects and surfaces it as a CORS error. The old
// code cached only successes, so every failing poll re-hit the endpoint — the
// "retrying every cycle, no backoff" bug. Two guards now prevent hammering:
//   1. GDELT_MIN_SPACING — at most one network attempt per 6s across ALL queries
//      (GDELT limits per IP globally, so spacing is shared, not per-instrument).
//   2. Exponential failure backoff — consecutive failures push `blockedUntil`
//      out (30s, 60s, 120s… capped at 10min); while blocked, no network call is
//      made at all. A reachable response clears the backoff.
// While spaced-out or backed-off, fetchNews returns stale cache if present,
// otherwise an explicit unavailable result. It never fabricates headlines.
// (fetchNews is I/O with real timing; the pure calculation layer is unaffected.)
const newsCache = Object.create(null);
const NEWS_TTL = 15 * 60 * 1000;
const GDELT_MIN_SPACING = 6000;             // > GDELT's 1-req/5s rule, with margin
const GDELT_BACKOFF_BASE = 30000;           // first failure waits 30s before retry
const GDELT_BACKOFF_MAX = 10 * 60 * 1000;   // cap the backoff at 10 minutes
const gdeltState = { lastAttempt: 0, blockedUntil: 0, fails: 0 };

async function fetchNews(inst) {
  const q = inst.newsQuery;
  const hit = newsCache[q];
  if (hit && Date.now() - hit.at < NEWS_TTL) return hit.value;

  const now = Date.now();
  // Backoff or spacing active: do not touch the network. Return best available.
  if (now < gdeltState.blockedUntil || now - gdeltState.lastAttempt < GDELT_MIN_SPACING) {
    if (hit) return hit.value;
    return { ok: false, items: [], error: 'gdelt-throttled', backoff: true };
  }

  gdeltState.lastAttempt = now;
  try {
    const url = 'https://api.gdeltproject.org/api/v2/doc/doc?query=' +
      encodeURIComponent(q + ' sourcelang:english') +
      '&mode=artlist&format=json&maxrecords=12&timespan=3d&sort=datedesc';
    const j = await getJson(url, 20000);
    // Reachable endpoint: clear any backoff regardless of item count.
    gdeltState.fails = 0;
    gdeltState.blockedUntil = 0;
    const items = (j.articles || []).map((a) => ({
      title: String(a.title || '').trim(),
      url: a.url,
      source: a.domain || '',
      seen: a.seendate || '',
    })).filter((a) => a.title);
    const value = { ok: items.length > 0, items };
    if (value.ok) newsCache[q] = { at: Date.now(), value };
    return value;
  } catch (err) {
    // Exponential backoff so a failing endpoint isn't hammered every cycle.
    gdeltState.fails += 1;
    gdeltState.blockedUntil = Date.now() +
      Math.min(GDELT_BACKOFF_BASE * 2 ** (gdeltState.fails - 1), GDELT_BACKOFF_MAX);
    // Stale cache beats nothing; otherwise report unavailable — never fabricate.
    if (hit) return hit.value;
    return { ok: false, items: [], error: String(err && err.message || err) };
  }
}

<script>
// ═══ inlined from src/indicators.js ═══
// ============================================================================
// INDICATOR MATH — pure, deterministic functions of a candle array.
// ----------------------------------------------------------------------------
// Conventions used throughout:
//  - Input candles: [{t,o,h,l,c,v}, ...] oldest -> newest (Phase 1 shape).
//  - Output series are arrays ALIGNED to the input, padded with `null` while
//    the lookback is not yet valid. No extrapolation, no padding with fakes:
//    a caller that needs "the current value" checks the tip for null and must
//    surface an explicit "not enough data" state (see analysis.js).
//  - Everything is a pure function: same candles in -> same numbers out,
//    independent of wall-clock time or polling cadence.
//  - Seeding conventions match the reference implementations they were
//    verified against (technicalindicators / pandas-ta) — see
//    test/indicators-ref-test.mjs for the numeric comparison and tolerances.
//
// CLOSE-ONLY ADAPTATIONS (forex + silver daily series have one official fix
// per day, so h == l == c). Every formula that conventionally needs high/low
// takes an `ohlc` flag and, when false, switches to a documented
// close-to-close variant. Adapted formulas are marked with [C2C] below:
//   [C2C] True Range  -> |close - prevClose|            (used by ATR, Keltner)
//   [C2C] +DM / -DM   -> max(Δclose,0) / max(-Δclose,0) (used by ADX/DI)
//   [C2C] TTM squeeze midline -> uses highest/lowest CLOSE instead of high/low
//   [C2C] Swing points (Tier 3 forex) -> fractals on closes, not highs/lows
// Volume-dependent math (CMF, VWAP) is NOT adapted — without real volume it is
// meaningless, so it reports "not available" for close-only series instead.
// ============================================================================

function closes(candles) { return candles.map((x) => x.c); }

function nullPad(n) { return new Array(n).fill(null); }

// --- Simple / exponential moving averages -----------------------------------
function sma(values, period) {
  const out = nullPad(values.length);
  let sum = 0;
  for (let i = 0; i < values.length; i++) {
    sum += values[i];
    if (i >= period) sum -= values[i - period];
    if (i >= period - 1) out[i] = sum / period;
  }
  return out;
}

// EMA seeded with the SMA of the first `period` values (the convention used by
// both technicalindicators and pandas-ta with sma=True).
function ema(values, period) {
  const out = nullPad(values.length);
  if (values.length < period) return out;
  const k = 2 / (period + 1);
  let seed = 0;
  for (let i = 0; i < period; i++) seed += values[i];
  let prev = seed / period;
  out[period - 1] = prev;
  for (let i = period; i < values.length; i++) {
    prev = values[i] * k + prev * (1 - k);
    out[i] = prev;
  }
  return out;
}

// Wilder's smoothing (RMA) — used by RSI, ATR, ADX. Seeded with SMA.
function rma(values, period) {
  const out = nullPad(values.length);
  if (values.length < period) return out;
  let seed = 0;
  for (let i = 0; i < period; i++) seed += values[i];
  let prev = seed / period;
  out[period - 1] = prev;
  for (let i = period; i < values.length; i++) {
    prev = (prev * (period - 1) + values[i]) / period;
    out[i] = prev;
  }
  return out;
}

// --- RSI (Wilder, 14) --------------------------------------------------------
function rsi(values, period) {
  const out = nullPad(values.length);
  if (values.length <= period) return out;
  const gains = [], losses = [];
  for (let i = 1; i < values.length; i++) {
    const d = values[i] - values[i - 1];
    gains.push(Math.max(d, 0));
    losses.push(Math.max(-d, 0));
  }
  const avgG = rma(gains, period);
  const avgL = rma(losses, period);
  for (let i = period - 1; i < gains.length; i++) {
    const g = avgG[i], l = avgL[i];
    out[i + 1] = l === 0 ? 100 : 100 - 100 / (1 + g / l);
  }
  return out;
}

// --- MACD (12, 26, 9) --------------------------------------------------------
function macd(values, fast, slow, refPeriod) {
  const emaF = ema(values, fast);
  const emaS = ema(values, slow);
  const line = values.map((_, i) =>
    emaF[i] !== null && emaS[i] !== null ? emaF[i] - emaS[i] : null);
  // reference line = EMA of the macd line, starting where the line becomes valid
  const firstIdx = line.findIndex((x) => x !== null);
  const sig = nullPad(values.length);
  if (firstIdx >= 0) {
    const valid = line.slice(firstIdx);
    const sigValid = ema(valid, refPeriod);
    for (let i = 0; i < sigValid.length; i++) sig[firstIdx + i] = sigValid[i];
  }
  const hist = line.map((x, i) => (x !== null && sig[i] !== null ? x - sig[i] : null));
  return { line, ref: sig, hist };
}

// --- Bollinger Bands (20, 2) — population standard deviation ------------------
function bollinger(values, period, mult) {
  const mid = sma(values, period);
  const upper = nullPad(values.length);
  const lower = nullPad(values.length);
  const width = nullPad(values.length);
  for (let i = period - 1; i < values.length; i++) {
    let s = 0;
    for (let j = i - period + 1; j <= i; j++) s += (values[j] - mid[i]) ** 2;
    const sd = Math.sqrt(s / period);
    upper[i] = mid[i] + mult * sd;
    lower[i] = mid[i] - mult * sd;
    width[i] = mid[i] !== 0 ? (upper[i] - lower[i]) / mid[i] : null;
  }
  return { mid, upper, lower, width };
}

// --- True Range / ATR ---------------------------------------------------------
// [C2C] when ohlc=false the daily series has one fix per day (h==l==c), so the
// classic TR collapses to 0. The honest substitute is the close-to-close move.
function trueRange(candles, ohlc) {
  const out = nullPad(candles.length);
  for (let i = 1; i < candles.length; i++) {
    const cur = candles[i], pc = candles[i - 1].c;
    out[i] = ohlc
      ? Math.max(cur.h - cur.l, Math.abs(cur.h - pc), Math.abs(cur.l - pc))
      : Math.abs(cur.c - pc);
  }
  return out;
}

function atr(candles, period, ohlc) {
  const tr = trueRange(candles, ohlc).slice(1); // drop leading null
  const smoothed = rma(tr, period);
  return [null, ...smoothed];
}

// --- ADX / DI (Wilder, 14) ----------------------------------------------------
// [C2C] +DM/-DM conventionally come from high/low expansion. For close-only
// series each day's move contributes one-sided close-to-close direction, so
// DI/ADX then measure the persistence of daily close moves. Same smoothing.
function adx(candles, period, ohlc) {
  const n = candles.length;
  const empty = { adx: nullPad(n), plusDi: nullPad(n), minusDi: nullPad(n) };
  if (n < 2 * period + 1) return empty;
  const pDM = [], mDM = [], trArr = [];
  for (let i = 1; i < n; i++) {
    const cur = candles[i], prev = candles[i - 1];
    let up, dn;
    if (ohlc) {
      up = cur.h - prev.h;
      dn = prev.l - cur.l;
    } else {
      const d = cur.c - prev.c;
      up = d; dn = -d;
    }
    pDM.push(up > dn && up > 0 ? up : 0);
    mDM.push(dn > up && dn > 0 ? dn : 0);
    trArr.push(ohlc
      ? Math.max(cur.h - cur.l, Math.abs(cur.h - prev.c), Math.abs(cur.l - prev.c))
      : Math.abs(cur.c - prev.c));
  }
  const sTR = rma(trArr, period), sP = rma(pDM, period), sM = rma(mDM, period);
  const plusDi = nullPad(n), minusDi = nullPad(n), dx = [];
  for (let i = period - 1; i < trArr.length; i++) {
    const p = sTR[i] > 0 ? (100 * sP[i]) / sTR[i] : 0;
    const m = sTR[i] > 0 ? (100 * sM[i]) / sTR[i] : 0;
    plusDi[i + 1] = p; minusDi[i + 1] = m;
    dx.push(p + m > 0 ? (100 * Math.abs(p - m)) / (p + m) : 0);
  }
  const adxValid = rma(dx, period);
  const out = nullPad(n);
  for (let i = 0; i < adxValid.length; i++) {
    if (adxValid[i] !== null) out[period + i] = adxValid[i];
  }
  return { adx: out, plusDi, minusDi };
}

// --- Tier 2: Kaufman's Adaptive Moving Average (10, 2, 30) ---------------------
// ER   = |close_i - close_{i-er}| / Σ|close_j - close_{j-1}| over the window
// SC   = (ER * (fastSC - slowSC) + slowSC)^2   with fastSC=2/(2+1), slowSC=2/(30+1)
// KAMA = KAMA_prev + SC * (close - KAMA_prev), seeded with close[er-1]
// (seed convention matches pandas-ta; verified in the reference test)
function kama(values, erPeriod, fastP, slowP) {
  const out = nullPad(values.length);
  if (values.length <= erPeriod) return out;
  const fastSC = 2 / (fastP + 1), slowSC = 2 / (slowP + 1);
  let prev = values[erPeriod - 1];
  out[erPeriod - 1] = prev;
  for (let i = erPeriod; i < values.length; i++) {
    let vol = 0;
    for (let j = i - erPeriod + 1; j <= i; j++) vol += Math.abs(values[j] - values[j - 1]);
    const er = vol > 0 ? Math.abs(values[i] - values[i - erPeriod]) / vol : 0;
    const sc = (er * (fastSC - slowSC) + slowSC) ** 2;
    prev = prev + sc * (values[i] - prev);
    out[i] = prev;
  }
  return out;
}

// --- Tier 2: Laguerre RSI (Ehlers, gamma 0.5) ----------------------------------
// A four-stage Laguerre filter cascade; the "RSI" is the up-move share of the
// absolute differences between successive filter stages. Output in [0, 1].
//   L0 = (1-γ)·p + γ·L0'      L1 = -γ·L0 + L0' + γ·L1'
//   L2 = -γ·L1 + L1' + γ·L2'  L3 = -γ·L2 + L2' + γ·L3'
//   CU = Σ max(Lk - Lk+1, 0), CD = Σ max(Lk+1 - Lk, 0), LRSI = CU/(CU+CD)
// Verified against a hand-stepped independent computation of the recursion.
function laguerreRsi(values, gamma) {
  const out = nullPad(values.length);
  if (!values.length) return out;
  let l0 = values[0], l1 = values[0], l2 = values[0], l3 = values[0];
  // First WARMUP bars are suppressed (null): the filter state still remembers
  // its price-seeded start, so early values are not yet trustworthy.
  const WARMUP = 20;
  for (let i = 0; i < values.length; i++) {
    const p = values[i];
    const p0 = l0, p1 = l1, p2 = l2;
    l0 = (1 - gamma) * p + gamma * p0;
    l1 = -gamma * l0 + p0 + gamma * p1;
    l2 = -gamma * l1 + p1 + gamma * p2;
    l3 = -gamma * l2 + p2 + gamma * l3;
    let cu = 0, cd = 0;
    if (l0 >= l1) cu += l0 - l1; else cd += l1 - l0;
    if (l1 >= l2) cu += l1 - l2; else cd += l2 - l1;
    if (l2 >= l3) cu += l2 - l3; else cd += l3 - l2;
    if (i >= WARMUP) out[i] = cu + cd > 0 ? cu / (cu + cd) : 0.5;
  }
  return out;
}

// --- Tier 2: volatility squeeze (Bollinger inside Keltner, TTM-style) ----------
// squeeze ON  = BB(20,2) fully inside KC(20, 1.5×TR-SMA20) -> volatility coiling
// squeeze OFF = bands released                             -> expansion phase
// Keltner convention: SMA(20) midline ± 1.5 × SMA(20) of true range — the
// TradingView "LazyBear" / pandas-ta squeeze default, which this implementation
// is numerically verified against. (Classic Keltner uses EMA; platforms differ,
// so the convention is pinned here deliberately.)
// Momentum: linear-regression endpoint (20) of close minus the midline
//   midline = ((highestHigh20 + lowestLow20)/2 + SMA20)/2   (Donchian/SMA blend)
// [C2C] for close-only series highest/lowest use closes, ATR is close-to-close.
function linregEndpoint(values, period, atIdx) {
  // least-squares fit over values[atIdx-period+1 .. atIdx], evaluated at the end
  let sx = 0, sy = 0, sxy = 0, sxx = 0;
  for (let k = 0; k < period; k++) {
    const x = k, y = values[atIdx - period + 1 + k];
    sx += x; sy += y; sxy += x * y; sxx += x * x;
  }
  const denom = period * sxx - sx * sx;
  if (denom === 0) return sy / period;
  const b = (period * sxy - sx * sy) / denom;
  const a = (sy - b * sx) / period;
  return a + b * (period - 1);
}

function squeeze(candles, ohlc) {
  const n = candles.length;
  const cl = closes(candles);
  const bb = bollinger(cl, 20, 2);
  const trSma = [null, ...sma(trueRange(candles, ohlc).slice(1), 20)];
  const on = nullPad(n), momentum = nullPad(n);
  const detrended = nullPad(n);
  for (let i = 0; i < n; i++) {
    if (bb.upper[i] === null || trSma[i] === null || bb.mid[i] === null) continue;
    const kcU = bb.mid[i] + 1.5 * trSma[i];
    const kcL = bb.mid[i] - 1.5 * trSma[i];
    on[i] = bb.upper[i] < kcU && bb.lower[i] > kcL;
    let hh = -Infinity, ll = Infinity;
    for (let j = i - 19; j <= i; j++) {
      hh = Math.max(hh, ohlc ? candles[j].h : candles[j].c);
      ll = Math.min(ll, ohlc ? candles[j].l : candles[j].c);
    }
    detrended[i] = cl[i] - ((hh + ll) / 2 + (bb.mid[i] ?? cl[i])) / 2;
  }
  for (let i = 0; i < n; i++) {
    if (detrended[i] === null) continue;
    let ok = true;
    for (let j = i - 19; j <= i; j++) if (j < 0 || detrended[j] === null) { ok = false; break; }
    if (ok) momentum[i] = linregEndpoint(detrended, 20, i);
  }
  return { on, momentum };
}

// --- Chaikin Money Flow (20) — requires real H/L/V (crypto + gold hourly only) --
function cmf(candles, period) {
  const out = nullPad(candles.length);
  for (let i = period - 1; i < candles.length; i++) {
    let mfv = 0, vol = 0;
    for (let j = i - period + 1; j <= i; j++) {
      const { h, l, c, v } = candles[j];
      if (h !== l) mfv += (((c - l) - (h - c)) / (h - l)) * v;
      vol += v;
    }
    out[i] = vol > 0 ? mfv / vol : 0;
  }
  return out;
}

// --- Rolling VWAP deviation z-score (window 48 = two days of hourly bars) -------
// vwap_i = Σ(tp·v)/Σv over the window, tp = (h+l+c)/3
// z_i    = (close - vwap) / stdev(close - vwap over the window)
// Requires real volume; not computed for close-only series.
function vwapDeviation(candles, window) {
  const n = candles.length;
  const out = { vwap: nullPad(n), z: nullPad(n) };
  for (let i = window - 1; i < n; i++) {
    let pv = 0, vol = 0;
    for (let j = i - window + 1; j <= i; j++) {
      const tp = (candles[j].h + candles[j].l + candles[j].c) / 3;
      pv += tp * candles[j].v; vol += candles[j].v;
    }
    if (vol <= 0) continue;
    const vw = pv / vol;
    let s = 0, s2 = 0;
    for (let j = i - window + 1; j <= i; j++) {
      const d = candles[j].c - vw; s += d; s2 += d * d;
    }
    const mean = s / window;
    const sd = Math.sqrt(Math.max(s2 / window - mean * mean, 0));
    out.vwap[i] = vw;
    out.z[i] = sd > 0 ? (candles[i].c - vw) / sd : 0;
  }
  return out;
}

// --- Structural levels ----------------------------------------------------------
// Swing points via symmetric fractals: a bar whose value is the strict maximum
// (or minimum) of its 2k+1 neighborhood. [C2C] close-only series use closes;
// OHLC series use true highs/lows.
function swingPoints(candles, k, ohlc) {
  const highsArr = candles.map((c) => (ohlc ? c.h : c.c));
  const lowsArr = candles.map((c) => (ohlc ? c.l : c.c));
  const highs = [], lows = [];
  for (let i = k; i < candles.length - k; i++) {
    let isHigh = true, isLow = true;
    for (let j = i - k; j <= i + k; j++) {
      if (j === i) continue;
      if (highsArr[j] >= highsArr[i]) isHigh = false;
      if (lowsArr[j] <= lowsArr[i]) isLow = false;
      if (!isHigh && !isLow) break;
    }
    if (isHigh) highs.push({ i, price: highsArr[i], t: candles[i].t });
    if (isLow) lows.push({ i, price: lowsArr[i], t: candles[i].t });
  }
  return { highs, lows };
}

// Cluster swing points that sit within `tol` (absolute price) of each other
// into zones; a zone's strength = number of touches, price = touch average.
function clusterZones(points, tol) {
  const sorted = [...points].sort((a, b) => a.price - b.price);
  const zones = [];
  for (const p of sorted) {
    const z = zones[zones.length - 1];
    if (z && p.price - z.max <= tol) {
      z.sum += p.price; z.n += 1; z.max = Math.max(z.max, p.price);
      z.lastT = Math.max(z.lastT, p.t);
    } else {
      zones.push({ sum: p.price, n: 1, max: p.price, lastT: p.t });
    }
  }
  return zones.map((z) => ({ price: z.sum / z.n, touches: z.n, lastT: z.lastT }));
}

// Fibonacci retracement of the dominant swing over the lookback window.
function fibLevels(candles, lookback, ohlc) {
  const n = candles.length;
  if (n < lookback) return null;
  let hi = -Infinity, lo = Infinity, hiI = 0, loI = 0;
  for (let i = n - lookback; i < n; i++) {
    const h = ohlc ? candles[i].h : candles[i].c;
    const l = ohlc ? candles[i].l : candles[i].c;
    if (h > hi) { hi = h; hiI = i; }
    if (l < lo) { lo = l; loI = i; }
  }
  if (!(hi > lo)) return null;
  const up = loI < hiI; // dominant move direction inside the window
  const ratios = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
  const levels = ratios.map((r) => ({
    ratio: r,
    price: up ? hi - (hi - lo) * r : lo + (hi - lo) * r,
  }));
  return { high: hi, low: lo, direction: up ? 'up' : 'down', levels };
}

// Classic floor-trader pivots from the previous completed UTC day.
// Only meaningful with real intraday OHLC — returns null for close-only series.
function pivotPoints(candles, ohlc) {
  if (!ohlc || candles.length < 48) return null;
  const dayOf = (t) => Math.floor(t / 864e5);
  const lastDay = dayOf(candles[candles.length - 1].t);
  let h = -Infinity, l = Infinity, c = null, seen = false;
  for (const cd of candles) {
    if (dayOf(cd.t) === lastDay - 1) {
      seen = true;
      h = Math.max(h, cd.h); l = Math.min(l, cd.l); c = cd.c;
    }
  }
  if (!seen || c === null) return null;
  const p = (h + l + c) / 3;
  return {
    p,
    r1: 2 * p - l, s1: 2 * p - h,
    r2: p + (h - l), s2: p - (h - l),
  };
}

<script>
// ═══ inlined from src/analysis.js ═══
// ============================================================================
// ANALYSIS LAYER — turns indicator math into descriptive readings and the
// three-tier composite. Everything here DESCRIBES what the data shows; nothing
// is a recommendation, and no output is worded as an instruction to trade.
// ----------------------------------------------------------------------------
// Reading scale used everywhere: a number in [-1, +1].
//   +1 = the indicator's state skews strongly bullish *as a description*
//    0 = neutral / mixed
//   -1 = skews strongly bearish
// state labels derive from the reading: > +0.15 'bullish', < -0.15 'bearish',
// otherwise 'neutral'; 'na' = not enough data (excluded from every average —
// never padded or extrapolated, per the determinism/no-invention rules).
//
// Determinism: runAnalysis(series, headlines) is a pure function of the candle
// array + headline strings. No clocks, no randomness, no fetch.
// ============================================================================

const clamp1 = (x) => Math.max(-1, Math.min(1, x));
const stateOf = (r) => (r === null ? 'na' : r > 0.15 ? 'bullish' : r < -0.15 ? 'bearish' : 'neutral');

function tip(arr) { return arr.length ? arr[arr.length - 1] : null; }
function at(arr, back) { return arr.length > back ? arr[arr.length - 1 - back] : null; }

// ---------------------------------------------------------------------------
// Individual indicator readings (Tier 1 + Tier 2 members)
// Each returns { id, category, reading, state, value, extra? } — reading null
// (state 'na') whenever its lookback is not satisfied at the tip.
// ---------------------------------------------------------------------------
function readEmaCross(cl) {
  const e50 = ema(cl, 50), e200 = ema(cl, 200);
  const a = tip(e50), b = tip(e200), price = tip(cl);
  if (a === null || b === null) return { id: 'emaCross', category: 'trend', reading: null, state: 'na', value: null };
  // distance between EMAs, normalized by price, saturating at ±2%
  const spread = clamp1(((a - b) / price) / 0.02);
  // price side of the fast EMA adds conviction
  const side = price > a ? 0.25 : price < a ? -0.25 : 0;
  const reading = clamp1(0.75 * spread + side);
  return { id: 'emaCross', category: 'trend', reading, state: stateOf(reading), value: { ema50: a, ema200: b } };
}

function readRsi(cl) {
  const r = tip(rsi(cl, 14));
  if (r === null) return { id: 'rsi', category: 'momentum', reading: null, state: 'na', value: null };
  // 50 = neutral; overbought/oversold read as stretched, not as an instruction
  const reading = clamp1((r - 50) / 25);
  return { id: 'rsi', category: 'momentum', reading, state: stateOf(reading), value: r, zone: r >= 70 ? 'overbought' : r <= 30 ? 'oversold' : 'mid' };
}

function readMacd(cl, price) {
  const m = macd(cl, 12, 26, 9);
  const line = tip(m.line), sig = tip(m.ref), hist = tip(m.hist), histPrev = at(m.hist, 1);
  if (line === null || sig === null) return { id: 'macd', category: 'momentum', reading: null, state: 'na', value: null };
  const sep = clamp1(((line - sig) / price) / 0.005); // reference-line separation, saturates at 0.5% of price
  const grow = histPrev !== null && hist !== null ? (Math.abs(hist) >= Math.abs(histPrev) ? 1 : -1) : 0;
  const reading = clamp1(sep * (0.8 + 0.2 * grow));
  return { id: 'macd', category: 'momentum', reading, state: stateOf(reading), value: { line, ref: sig, hist } };
}

function readBollinger(cl) {
  const bb = bollinger(cl, 20, 2);
  const u = tip(bb.upper), l = tip(bb.lower), mid = tip(bb.mid), price = tip(cl);
  if (u === null) return { id: 'bollinger', category: 'volatility', reading: null, state: 'na', value: null };
  // %B centered: 0 at midline, ±1 at the bands
  const pctB = u === l ? 0 : ((price - l) / (u - l)) * 2 - 1;
  const reading = clamp1(pctB);
  return { id: 'bollinger', category: 'volatility', reading, state: stateOf(reading), value: { upper: u, mid, lower: l, pctB: (pctB + 1) / 2 } };
}

function readKama(cl) {
  const k = kama(cl, 10, 2, 30);
  const cur = tip(k), prev = at(k, 3), price = tip(cl);
  if (cur === null || prev === null) return { id: 'kama', category: 'trend', reading: null, state: 'na', value: null };
  const slope = clamp1(((cur - prev) / price) / 0.004); // 3-bar KAMA slope, saturates at 0.4% of price
  const side = price > cur ? 0.3 : price < cur ? -0.3 : 0;
  const reading = clamp1(0.7 * slope + side);
  return { id: 'kama', category: 'trend', reading, state: stateOf(reading), value: cur };
}

function readLaguerre(cl) {
  const lr = tip(laguerreRsi(cl, 0.5));
  if (lr === null) return { id: 'laguerre', category: 'momentum', reading: null, state: 'na', value: null };
  const reading = clamp1((lr - 0.5) * 2);
  return { id: 'laguerre', category: 'momentum', reading, state: stateOf(reading), value: lr };
}

function readSqueeze(candles, ohlc) {
  const sq = squeeze(candles, ohlc);
  const on = tip(sq.on), mom = tip(sq.momentum);
  if (on === null || mom === null) return { id: 'squeeze', category: 'volatility', reading: null, state: 'na', value: null };
  // normalize momentum by recent absolute scale so the reading is price-free
  const window = sq.momentum.slice(-60).filter((x) => x !== null).map(Math.abs);
  const scale = window.length ? Math.max(...window) : 0;
  const norm = scale > 0 ? clamp1(mom / scale) : 0;
  // While coiled, direction is muted (compression says "move brewing", not which way)
  const reading = clamp1(on ? norm * 0.35 : norm);
  return { id: 'squeeze', category: 'volatility', reading, state: stateOf(reading), value: { on, momentum: mom }, phase: on ? 'compression' : 'expansion' };
}

// ---------------------------------------------------------------------------
// Tier 3 composites — one per asset class, documented in place.
// ---------------------------------------------------------------------------

// FOREX — swing-zone structure + Laguerre momentum confirmation.
// What it measures: where price sits relative to clustered swing-high/low zones
// (a transparent take on supply/demand structure) and whether smoothed momentum
// agrees. Why forex-appropriate: daily FX closes mean-revert around well-tested
// levels more than they trend; distance-to-structure is the dominant input.
// Known limitations: [C2C] swings come from daily CLOSES (no intraday wicks),
// so zones are cruder than intraday structure; a fast regime change (central
// bank surprise) invalidates recent zones until new swings print.
function tier3Forex(candles, cl) {
  const a = tip(atr(candles, 14, false));
  const lr = tip(laguerreRsi(cl, 0.5));
  const price = tip(cl);
  if (a === null || lr === null || candles.length < 60) {
    return { id: 't3forex', reading: null, state: 'na', detail: null };
  }
  const swings = swingPoints(candles, 3, false);
  const tol = a * 0.75; // zone half-width scaled by current volatility
  const zones = clusterZones([...swings.highs, ...swings.lows], tol);
  const below = zones.filter((z) => z.price < price).sort((x, y) => y.price - x.price)[0] || null;
  const above = zones.filter((z) => z.price > price).sort((x, y) => x.price - y.price)[0] || null;
  // Position score: near a tested lower zone -> data skews supportive (+);
  // near a tested upper zone -> resistive (−). Proximity in ATR units, capped
  // at 3 ATR; zone strength (touch count) scales conviction up to 3 touches.
  let zoneScore = 0;
  if (below) {
    const prox = Math.max(0, 1 - (price - below.price) / (3 * a));
    zoneScore += prox * Math.min(below.touches, 3) / 3;
  }
  if (above) {
    const prox = Math.max(0, 1 - (above.price - price) / (3 * a));
    zoneScore -= prox * Math.min(above.touches, 3) / 3;
  }
  const momScore = (lr - 0.5) * 2;
  const reading = clamp1(0.6 * clamp1(zoneScore) + 0.4 * momScore);
  return {
    id: 't3forex', reading, state: stateOf(reading),
    detail: { nearestSupport: below, nearestResistance: above, laguerre: lr, atr: a },
  };
}

// CRYPTO — volume-weighted momentum: CMF(20) + rolling-VWAP deviation z-score.
// What it measures: whether volume is flowing into up-moves (CMF) and how far
// price has stretched from its volume-weighted mean (z of VWAP deviation).
// Why crypto-appropriate: 24/7 volume is the most informative confirmation in
// crypto; expansion/contraction of that stretch tracks volatility regimes.
// Known limitations: exchange volume is Binance-only (not global), and a large
// |z| reads as "stretched", which caps rather than amplifies the score.
function tier3Crypto(candles) {
  if (candles.length < 60) return { id: 't3crypto', reading: null, state: 'na', detail: null };
  const c20 = tip(cmf(candles, 20));
  const vd = vwapDeviation(candles, 48);
  const z = tip(vd.z);
  if (c20 === null || z === null) return { id: 't3crypto', reading: null, state: 'na', detail: null };
  const cmfScore = clamp1(c20 * 5);          // CMF ±0.20 is already a strong flow reading
  let zScore = clamp1(z / 2);                // ±2σ saturates
  if (Math.abs(z) > 2.5) zScore *= 0.6;      // beyond ~2.5σ: stretched, damp not amplify
  const reading = clamp1(0.5 * cmfScore + 0.5 * zScore);
  const bw = bollinger(candles.map((x) => x.c), 20, 2).width;
  const bwTip = tip(bw), bwWindow = bw.slice(-120).filter((x) => x !== null);
  const expanding = bwTip !== null && bwWindow.length > 10 &&
    bwTip > bwWindow.reduce((s, x) => s + x, 0) / bwWindow.length;
  return {
    id: 't3crypto', reading, state: stateOf(reading),
    detail: { cmf: c20, vwapZ: z, volatilityPhase: expanding ? 'expansion' : 'contraction' },
  };
}

// COMMODITIES (gold/silver) — ATR-calibrated volatility + ADX trend strength.
// What it measures: trend direction from DI+/DI−, conviction from ADX, with
// conviction damped when ATR sits in its own extreme percentile (noisy chop
// masquerading as trend). Why metals-appropriate: gold/silver trend in bursts
// between long noisy ranges; raw momentum overreads them without an ADX gate.
// Known limitations: [C2C] silver's daily close-only series uses close-to-close
// DM and TR, so DI/ADX measure persistence of daily moves, not intraday range.
function tier3Commodity(candles, ohlc) {
  if (candles.length < 60) return { id: 't3commodity', reading: null, state: 'na', detail: null };
  const { adx: adxArr, plusDi, minusDi } = adx(candles, 14, ohlc);
  const a = tip(adxArr), p = tip(plusDi), m = tip(minusDi);
  const atrArr = atr(candles, 14, ohlc);
  const atrTip = tip(atrArr), price = tip(candles).c;
  if (a === null || p === null || m === null || atrTip === null) {
    return { id: 't3commodity', reading: null, state: 'na', detail: null };
  }
  const dir = clamp1((p - m) / 25);                 // DI spread, saturates at 25 points
  const strength = Math.min(a, 50) / 50;            // ADX 50+ = fully trending
  // ATR percentile within its own trailing distribution (up to 250 bars)
  const hist = atrArr.slice(-250).filter((x) => x !== null).map((x) => x / price);
  const cur = atrTip / price;
  const pct = hist.length ? hist.filter((x) => x <= cur).length / hist.length : 0.5;
  const damp = pct > 0.85 ? 1 - (pct - 0.85) * 2 : 1; // extreme-vol damping, floor 0.7
  const reading = clamp1(dir * strength * damp);
  return {
    id: 't3commodity', reading, state: stateOf(reading),
    detail: { adx: a, plusDi: p, minusDi: m, atr: atrTip, atrPercentile: pct },
  };
}

// ---------------------------------------------------------------------------
// Sentiment — local lexicon scored per headline, averaged. [-1, +1] per line.
// ---------------------------------------------------------------------------
const SENTIMENT_LEXICON = {
  // bullish-leaning terms

};
const NEGATORS = ['not', 'no', "isn't", "aren't", "won't", 'without', 'despite', 'ends', 'end'];

function scoreHeadline(title) {
  const tokens = String(title).toLowerCase().replace(/[^\p{L}\p{N}'-]+/gu, ' ').split(/\s+/).filter(Boolean);
  let sum = 0, hits = 0;
  for (let i = 0; i < tokens.length; i++) {
    const w = SENTIMENT_LEXICON[tokens[i]];
    if (w === undefined) continue;
    // a negator within the 2 preceding tokens flips the term's direction
    const negated = tokens.slice(Math.max(0, i - 2), i).some((t) => NEGATORS.includes(t));
    sum += negated ? -w : w;
    hits++;
  }
  if (!hits) return 0;
  return clamp1(sum / Math.sqrt(hits)); // sqrt damping: many weak words ≠ one strong word
}

function scoreSentiment(headlines) {
  if (!headlines || !headlines.length) return { ok: false, score: null, perHeadline: [] };
  const perHeadline = headlines.map((h) => ({ title: h.title, score: +scoreHeadline(h.title).toFixed(2) }));
  const score = clamp1(perHeadline.reduce((s, x) => s + x.score, 0) / perHeadline.length);
  return { ok: true, score, perHeadline };
}

// ---------------------------------------------------------------------------
// Fusion — the composite reading. Weights per the spec:
//   Composite Technical = T1×0.20 + T2×0.30 + T3×0.50
//   Combined            = Technical×0.70 + Sentiment×0.30
// If a tier has no valid members (short history) its weight is redistributed
// pro-rata to the tiers that do have data, and this is reported explicitly in
// `weightsUsed` — never silently faked. If sentiment is unavailable, Combined
// falls back to the technical reading alone with sentimentIncluded=false.
// ---------------------------------------------------------------------------
function tierScore(members) {
  const valid = members.filter((m) => m.reading !== null);
  if (!valid.length) return null;
  return clamp1(valid.reduce((s, m) => s + m.reading, 0) / valid.length);
}

function runAnalysis(series, headlines) {
  const t0 = (typeof performance !== 'undefined' ? performance : Date).now();
  const { candles, meta } = series;
  const cl = candles.map((c) => c.c);
  const price = cl[cl.length - 1];
  const ohlc = !!meta.ohlc;

  // --- indicator readings -------------------------------------------------
  const t1members = [readEmaCross(cl), readRsi(cl), readMacd(cl, price), readBollinger(cl)];
  const t2members = [readKama(cl), readLaguerre(cl), readSqueeze(candles, ohlc)];
  let t3;
  if (meta.id === 'BTCUSD' || meta.id === 'ETHUSD') {
    t3 = meta.hasVolume
      ? tier3Crypto(candles)
      : { id: 't3crypto', reading: null, state: 'na', detail: null, reason: 'volume-unavailable' };
  } else if (meta.id === 'GOLD' || meta.id === 'SILVER') {
    t3 = tier3Commodity(candles, ohlc);
  } else {
    t3 = tier3Forex(candles, cl);
  }

  // volume gauge (crypto/gold hourly only) — descriptive extra, not a tier
  let volumeReading = { id: 'cmf', category: 'volume', reading: null, state: 'na', value: null };
  if (meta.hasVolume) {
    const c20 = tip(cmf(candles, 20));
    if (c20 !== null) {
      const r = clamp1(c20 * 5);
      volumeReading = { id: 'cmf', category: 'volume', reading: r, state: stateOf(r), value: c20 };
    }
  }

  const indicators = [...t1members, ...t2members, volumeReading, t3];

  // --- tiers + weight redistribution --------------------------------------
  const rawTiers = [
    { key: 't1', weight: 0.20, score: tierScore(t1members) },
    { key: 't2', weight: 0.30, score: tierScore(t2members) },
    { key: 't3', weight: 0.50, score: t3.reading },
  ];
  const avail = rawTiers.filter((t) => t.score !== null);
  const totalW = avail.reduce((s, t) => s + t.weight, 0);
  const weightsUsed = {};
  let compositeTechnical = null;
  if (avail.length && totalW > 0) {
    compositeTechnical = clamp1(avail.reduce((s, t) => s + t.score * (t.weight / totalW), 0));
    for (const t of rawTiers) weightsUsed[t.key] = t.score === null ? 0 : +(t.weight / totalW).toFixed(3);
  }

  // --- sentiment + combined ------------------------------------------------
  const sentiment = scoreSentiment(headlines);
  let combined = compositeTechnical, sentimentIncluded = false;
  if (compositeTechnical !== null && sentiment.ok) {
    combined = clamp1(compositeTechnical * 0.7 + sentiment.score * 0.3);
    sentimentIncluded = true;
  }

  // --- consensus counts (indicator states, not votes on a trade) ----------
  const consensus = { bullish: 0, bearish: 0, neutral: 0, na: 0 };
  for (const ind of indicators) consensus[ind.state]++;

  // --- structural levels & volatility descriptor ---------------------------
  const atr14 = tip(atr(candles, 14, ohlc));
  const atrRange = atr14 !== null ? { low: price - atr14, high: price + atr14, atr: atr14 } : null;
  const fib = fibLevels(candles, Math.min(120, candles.length), ohlc);
  const pivots = pivotPoints(candles, ohlc);

  let volatility = null;
  if (atr14 !== null) {
    const atrArr = atr(candles, 14, ohlc);
    const hist = atrArr.slice(-250).filter((x) => x !== null).map((x) => x / price);
    const pct = hist.length ? hist.filter((x) => x <= atr14 / price).length / hist.length : 0.5;
    volatility = {
      atrPct: atr14 / price,
      percentile: pct,
      band: pct < 0.25 ? 'low' : pct < 0.6 ? 'moderate' : pct < 0.85 ? 'elevated' : 'high',
    };
  }

  const elapsedMs = ((typeof performance !== 'undefined' ? performance : Date).now()) - t0;

  return {
    ok: compositeTechnical !== null,
    price,
    indicators,
    tiers: {
      t1: { score: rawTiers[0].score, members: t1members },
      t2: { score: rawTiers[1].score, members: t2members },
      t3: { score: t3.reading, composite: t3 },
    },
    weightsUsed,
    compositeTechnical,
    sentiment,
    sentimentIncluded,
    combined,
    consensus,
    levels: { atrRange, fib, pivots },
    volatility,
    insufficient: indicators.filter((i) => i.state === 'na').map((i) => i.id),
    elapsedMs,
  };
}
