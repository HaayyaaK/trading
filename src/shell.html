<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مِرصاد الأسواق — Market Mirsad</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="assets/site.webmanifest">
<meta name="theme-color" content="#0b0e15">
<!-- Fonts: Cairo (Arabic) + Inter (Latin). Chart.js does real work (three charts). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div class="wrap">
  <header class="site">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3 17 8 10l4 4 6-9" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="18" cy="5" r="2" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1 id="app-title"></h1>
        <p id="app-subtitle"></p>
      </div>
    </div>
    <div class="head-tools">
      <span id="status-badge" class="status-badge"><span class="dot"></span></span>
      <div class="pill-toggle" role="group" aria-label="language">
        <button id="btn-ar" type="button">عربي</button>
        <button id="btn-en" type="button">EN</button>
      </div>
      <button id="btn-theme" class="icon-btn" type="button" aria-label="theme"></button>
    </div>
  </header>

  <main>
    <section class="card" data-card="selection">
      <h2 class="card-head"><span class="card-title" id="selection-title"></span></h2>
      <div class="card-body">
        <div class="selection-grid">
          <div class="field"><label id="label-class" for="sel-class"></label><select id="sel-class"></select></div>
          <div class="field"><label id="label-instrument" for="sel-instrument"></label><select id="sel-instrument"></select></div>
          <div class="field"><label id="label-timeframe" for="sel-timeframe"></label><select id="sel-timeframe"></select></div>
          <div><button id="btn-run" class="btn-primary" type="button"></button></div>
        </div>
        <div class="hint" id="tf-note"></div>
        <div class="hint" id="auto-note"></div>
      </div>
    </section>

    <section class="card" data-card="reading">
      <h2 class="card-head"><span class="card-title" id="reading-title"></span></h2>
      <div class="card-body"><div id="reading-body"></div></div>
    </section>

    <div class="two-col">
      <div class="col">
        <section class="card" data-card="tiers">
          <h2 class="card-head"><span class="card-title" id="tiers-title"></span></h2>
          <div class="card-body"><div id="tiers-body"></div></div>
        </section>
        <section class="card" data-card="indicators">
          <h2 class="card-head"><span class="card-title" id="indicators-title"></span></h2>
          <div class="card-body"><div id="indicators-body"></div></div>
        </section>
        <section class="card" data-card="levels">
          <h2 class="card-head"><span class="card-title" id="levels-title"></span></h2>
          <div class="card-body"><div id="levels-body"></div></div>
        </section>
      </div>
      <div class="col">
        <section class="card" data-card="news">
          <h2 class="card-head"><span class="card-title" id="news-title"></span></h2>
          <div class="card-body"><div id="news-body"></div></div>
        </section>
        <section class="card" data-card="charts">
          <h2 class="card-head"><span class="card-title" id="charts-title"></span></h2>
          <div class="card-body">
            <div class="chart-box"><div class="t" id="chart-price-t"></div><canvas id="chart-price"></canvas></div>
            <div class="chart-box"><div class="t" id="chart-volume-t"></div><canvas id="chart-volume"></canvas><div class="chart-na" id="chart-volume-na" style="display:none"></div></div>
            <div class="chart-box"><div class="t" id="chart-volatility-t"></div><canvas id="chart-volatility"></canvas></div>
          </div>
        </section>
      </div>
    </div>

    <section class="card" data-card="report">
      <h2 class="card-head"><span class="card-title" id="report-title"></span></h2>
      <div class="card-body"><div id="report-body"></div></div>
    </section>
  </main>

  <footer class="site">
    <span id="footer-sources"></span>
    <span id="footer-disclaimer"></span>
  </footer>
</div>

<script src="src/seeds.js"></script>
<script src="src/data.js"></script>
<script src="src/indicators.js"></script>
<script src="src/analysis.js"></script>
<script src="src/i18n.js"></script>
<script src="src/report.js"></script>
<script src="src/ui.js"></script>
</body>
</html>
